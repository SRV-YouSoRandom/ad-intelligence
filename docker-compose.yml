version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - media_storage:/app/media_storage
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: app/Dockerfile
    command: python worker_main.py
    env_file: .env
    volumes:
      - media_storage:/app/media_storage
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adint
      POSTGRES_PASSWORD: adint
      POSTGRES_DB: adint
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adint"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:7-alpine
    volumes:
      - valkey_data:/data

volumes:
  postgres_data:
  valkey_data:
  media_storage:
